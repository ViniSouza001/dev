<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./stylesheets/style.css">
    <script src="./scripts/mock.js"></script>
</head>
<body>
    <main>
        <header>
            <img id="perfil" src="./assets/perfil.png">
        </header>
        <div>
            <img src="./assets/mail.png" alt="mail" class="icons">
            <input autocomplete="off" type="email" name="email" id="email" placeholder="Digite seu email">

        </div>
        <div>
            <img src="./assets/lock.png" alt="lock" id="lock" class="icons">
            <input type="password" name="senha" id="senha" placeholder="Digite sua senha">
        </div>
        <button onclick="authenticate()">Autenticar</button>
        <h2 id="erro">Senha ou usuário incorretos</h2>
    </main>
</body>
<script src="./scripts/script.js"></script>
</html>
